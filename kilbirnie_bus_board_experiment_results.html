<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment Results — EBIS Science Fair</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Alice&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Alice', serif;
      background: #ffffff;
      color: #222222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #ffffff;
      border-bottom: 3px solid #68AAE3;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    header img {
      height: 60px;
      width: auto;
    }

    header .site-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #b0b0b0;
    }

    /* ── Hero banner ── */
    .hero {
      background: #68AAE3;
      color: #ffffff;
      text-align: center;
      padding: 60px 40px 50px;
    }

    .hero h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.05rem;
      opacity: 0.9;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Main content ── */
    main {
      flex: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 40px;
      width: 100%;
    }

    /* ── Question title ── */
    .question-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #222;
      text-align: center;
      margin-bottom: 8px;
    }

    /* ── Tally badge ── */
    .tally {
      text-align: center;
      margin-bottom: 40px;
    }

    .tally-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f0f7ff;
      border: 2px solid #68AAE3;
      border-radius: 30px;
      padding: 8px 22px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #3a7fc1;
    }

    .tally-number {
      font-size: 1.4rem;
      font-weight: 700;
      color: #68AAE3;
    }

    /* ── Chart area ── */
    .chart-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 50px;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .chart-canvas-wrap {
      width: 280px;
      height: 280px;
      flex-shrink: 0;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 220px;
    }

    .legend-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .legend-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      line-height: 1.4;
    }

    .legend-pct {
      font-size: 1.2rem;
      font-weight: 700;
      color: #222;
    }

    .legend-count {
      font-size: 0.75rem;
      color: #999;
      font-weight: 400;
    }

    /* ── Commentary ── */
    .commentary {
      background: #f8fbff;
      border-left: 4px solid #68AAE3;
      border-radius: 6px;
      padding: 24px 28px;
      margin-bottom: 40px;
    }

    .commentary-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b0b0b0;
      margin-bottom: 8px;
    }

    .commentary-text {
      font-size: 1rem;
      line-height: 1.8;
      color: #333;
    }

    .commentary-text strong {
      color: #68AAE3;
    }

    /* ── Loading / error ── */
    .status-msg {
      text-align: center;
      padding: 60px 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      color: #aaa;
    }

    /* ── Refresh note ── */
    .refresh-note {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      color: #ccc;
      margin-bottom: 30px;
    }

    /* ── Back link ── */
    .back-wrap {
      text-align: center;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #68AAE3;
      text-decoration: none;
      border: 2px solid #68AAE3;
      border-radius: 6px;
      padding: 12px 24px;
      transition: background 0.2s, color 0.2s;
    }

    .back-link:hover {
      background: #68AAE3;
      color: #ffffff;
    }

    /* ── Footer ── */
    footer {
      background: #f7f7f7;
      text-align: center;
      padding: 24px 40px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: #b0b0b0;
      text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      .hero { padding: 40px 20px 36px; }
      .hero h1 { font-size: 1.5rem; }
      main { padding: 40px 20px; }
      .chart-wrap { gap: 30px; }
      .chart-canvas-wrap { width: 240px; height: 240px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="https://images.squarespace-cdn.com/content/v1/5bbea2e8c46f6d19d5d00c8e/1558840589603-SIYH4M1B0RET3YE5MR0I/EBIS+Logo+L+no+background.png"
         alt="Evans Bay Intermediate School">
    <span class="site-title">Evans Bay Intermediate School</span>
  </header>

  <div class="hero">
    <h1>Experiment Results</h1>
    <p>Kilbirnie Bus Board — Science Fair Project</p>
  </div>

  <main id="main-content">
    <div class="status-msg" id="loading-msg">Loading survey results…</div>
  </main>

  <footer>
    Evans Bay Intermediate School &nbsp;·&nbsp; 14a Kemp St, Kilbirnie, Wellington &nbsp;·&nbsp; Ākonga Engaged on a Voyage of Success
  </footer>

  <script>
    // ── Colour palette ──────────────────────────────────────────────
    const COLOURS = {
      'It is really useful':      '#4caf82',   // green
      'It is okay':               '#68AAE3',   // school blue
      'I probably would not use it': '#e87a5a' // warm red
    };
    const COLOUR_FALLBACKS = ['#68AAE3','#4caf82','#e87a5a','#f5c842','#b77ee0'];

    // ── Data source ───────────────────────────────────────────────────
    // The Google Sheet must be Published to the web (File → Share →
    // Publish to web) for the browser to fetch it directly.
    // Until then, the page shows the embedded snapshot below.
    const SHEET_ID  = '1o7imq6JeSlwBz8F_KQFd8-zULJLnqTHX7yq1wfGTPaQ';
    const SHEET_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&range=A:D`;

    function parseCSV(text) {
      const rows = [];
      const lines = text.trim().split('\n');
      for (const line of lines) {
        const cols = [];
        let inQ = false, cur = '';
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
          else { cur += ch; }
        }
        cols.push(cur);
        rows.push(cols);
      }
      return rows;
    }

    function buildCommentary(counts, total) {
      if (total === 0) return 'No responses recorded yet.';

      const useful  = counts['It is really useful']         || 0;
      const okay    = counts['It is okay']                  || 0;
      const noUse   = counts['I probably would not use it'] || 0;
      const positive = useful;
      const positivePct = Math.round((positive / total) * 100);
      const usefulPct   = Math.round((useful   / total) * 100);
      const okayPct     = Math.round((okay     / total) * 100);
      const noUsePct    = Math.round((noUse    / total) * 100);

      let lines = [];

      // Overall lead sentence
      if (positivePct >= 60) {
        lines.push(`<strong>${positivePct}%</strong> of respondents say the bus board is really useful — a strong vote of confidence for the project.`);
      } else if (positivePct >= 40) {
        lines.push(`<strong>${positivePct}%</strong> of respondents find the bus board really useful, with the rest split between neutral and negative views.`);
      } else if ((usefulPct + okayPct) >= 60) {
        lines.push(`<strong>${usefulPct + okayPct}%</strong> of respondents have a positive or neutral view of the bus board — most people see value in the idea.`);
      } else {
        lines.push(`Opinions are mixed so far. Only <strong>${usefulPct}%</strong> say it is really useful, while <strong>${noUsePct}%</strong> probably would not use it.`);
      }

      // Breakdown
      const parts = [];
      if (usefulPct > 0) parts.push(`<strong>${usefulPct}%</strong> find it really useful`);
      if (okayPct   > 0) parts.push(`<strong>${okayPct}%</strong> think it is okay`);
      if (noUsePct  > 0) parts.push(`<strong>${noUsePct}%</strong> probably would not use it`);
      if (parts.length > 1) {
        lines.push('Broken down: ' + parts.join(', ') + '.');
      }

      // Response count note
      lines.push(`Based on <strong>${total}</strong> response${total === 1 ? '' : 's'} collected during the Science Fair.`);

      return lines.join(' ');
    }

    // ── Snapshot data (fallback while sheet is not yet published) ────
    // Replace this object with fresh counts after publishing the sheet,
    // or it will be overwritten automatically once live fetch succeeds.
    const SNAPSHOT = {
      counts: {
        'It is really useful':         1,
        'It is okay':                  1,
        'I probably would not use it': 1
      },
      total: 3,
      note: 'test data — publish sheet to see live results'
    };

    async function fetchData() {
      // Option 1: local bus_data.json (Raspberry Pi served via http.server)
      try {
        const r = await fetch('bus_data.json');
        if (r.ok) {
          const j = await r.json();
          return { counts: j.counts, total: j.total, live: true };
        }
      } catch (_) {}

      // Option 2: direct fetch (works once sheet is Published to web)
      try {
        const res = await fetch(SHEET_CSV);
        if (res.ok) {
          const text = await res.text();
          const rows = parseCSV(text);
          if (rows.length >= 2) {
            const SENTIMENT_COL = 2;
            const counts = {};
            let total = 0;
            for (let i = 1; i < rows.length; i++) {
              const val = rows[i][SENTIMENT_COL]?.trim();
              if (!val) continue;
              counts[val] = (counts[val] || 0) + 1;
              total++;
            }
            return { counts, total, live: true };
          }
        }
      } catch (_) {}

      // Fallback: embedded snapshot
      return { counts: SNAPSHOT.counts, total: SNAPSHOT.total, live: false };
    }

    // ── Auto-refresh every 60 seconds ────────────────────────────────
    const REFRESH_MS = 60000;
    let   chartInstance = null;

    async function refresh() {
      try {
        const { counts, total, live } = await fetchData();
        const labels  = Object.keys(counts);
        const values  = labels.map(l => counts[l]);
        const colours = labels.map((l, i) => COLOURS[l] || COLOUR_FALLBACKS[i % COLOUR_FALLBACKS.length]);

        if (!chartInstance) {
          // ── First load: build the page structure ─────────────────
          document.getElementById('main-content').innerHTML = `
            <p class="question-title">What do you think of the bus board?</p>

            <div class="tally">
              <div class="tally-badge">
                <span>Total responses</span>
                <span class="tally-number" id="tally-num">${total}</span>
              </div>
            </div>

            <div class="chart-wrap">
              <div class="chart-canvas-wrap">
                <canvas id="pie-chart"></canvas>
              </div>
              <div class="legend" id="legend"></div>
            </div>

            <div class="commentary">
              <div class="commentary-label">Commentary</div>
              <p class="commentary-text" id="commentary-text"></p>
            </div>

            ${!live ? `<p style="text-align:center;font-family:'Montserrat',sans-serif;font-size:0.72rem;color:#ccc;margin-bottom:16px">Showing sample data · publish the Google Sheet to web for live results</p>` : ''}

            <p class="refresh-note" id="refresh-note"></p>

            <div class="back-wrap">
              <a class="back-link" href="index.html">← Back to project</a>
            </div>
          `;

          // Build legend
          buildLegend(labels, values, colours, total);

          // Create chart
          const ctx = document.getElementById('pie-chart').getContext('2d');
          chartInstance = new Chart(ctx, {
            type: 'pie',
            data: {
              labels,
              datasets: [{
                data: values,
                backgroundColor: colours,
                borderColor: '#ffffff',
                borderWidth: 3,
                hoverOffset: 8
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: ctx => {
                      const pct = Math.round((ctx.parsed / total) * 100);
                      return ` ${ctx.label}: ${pct}% (${ctx.parsed})`;
                    }
                  }
                }
              }
            }
          });

        } else {
          // ── Subsequent refresh: update existing chart ─────────────
          chartInstance.data.labels              = labels;
          chartInstance.data.datasets[0].data    = values;
          chartInstance.data.datasets[0].backgroundColor = colours;
          chartInstance.update();
          buildLegend(labels, values, colours, total);
          document.getElementById('tally-num').textContent = total;
        }

        document.getElementById('commentary-text').innerHTML = buildCommentary(counts, total);
        document.getElementById('refresh-note').textContent  =
          `Last updated ${new Date().toLocaleTimeString()} · refreshes every 60 s`;

      } catch (err) {
        if (!chartInstance) {
          document.getElementById('main-content').innerHTML = `
            <div class="status-msg">
              Could not load results — please try refreshing the page.<br>
              <small style="color:#ccc;margin-top:8px;display:block">${err.message}</small>
            </div>
            <div class="back-wrap" style="margin-top:30px">
              <a class="back-link" href="index.html">← Back to project</a>
            </div>
          `;
        }
        // If chart already visible, keep it — just skip this refresh silently
      }
    }

    function buildLegend(labels, values, colours, total) {
      const legendEl = document.getElementById('legend');
      legendEl.innerHTML = '';
      labels.forEach((label, i) => {
        const pct = Math.round((values[i] / total) * 100);
        legendEl.innerHTML += `
          <div class="legend-item">
            <div class="legend-dot" style="background:${colours[i]}"></div>
            <div>
              <div class="legend-label">${label}</div>
              <div class="legend-pct">${pct}% <span class="legend-count">(${values[i]} vote${values[i] === 1 ? '' : 's'})</span></div>
            </div>
          </div>
        `;
      });
    }

    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>

</body>
</html>
